```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ARIZOE JUSTICE - Secure Login Portal">
    <title>ARIZOE JUSTICE | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        .login-card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
        }
        .tab-active {
            border-bottom: 3px solid #3b82f6;
            color: white;
        }
    </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex items-center justify-center">
    <div class="absolute inset-0 bg-[radial-gradient(at_center,#1e3a8a_0%,transparent_70%)] opacity-60"></div>
    
    <div class="container mx-auto px-6 py-12 max-w-lg relative z-10">
        <!-- Back to Home -->
        <a href="index.html" 
           class="inline-flex items-center gap-x-3 text-zinc-400 hover:text-white mb-10 transition-colors">
            <i class="fa-solid fa-arrow-left"></i>
            <span class="font-medium">Back to ARIZOE JUSTICE</span>
        </a>

        <!-- Logo -->
        <div class="flex items-center justify-center gap-x-4 mb-12">
            <div class="w-14 h-14 bg-blue-600 rounded-3xl flex items-center justify-center text-4xl shadow-xl shadow-blue-500/50">
                ⚖️
            </div>
            <div>
                <span class="block text-4xl font-bold tracking-tighter">ARIZOE</span>
                <span class="block text-4xl font-bold tracking-tighter text-blue-400 -mt-3">JUSTICE</span>
            </div>
        </div>

        <div class="login-card rounded-3xl border border-white/10 p-10 shadow-2xl">
            <!-- Login Type Tabs -->
            <div class="flex border-b border-white/10 mb-10">
                <button onclick="switchTab(0)" 
                        class="tab tab-active flex-1 py-5 text-sm font-semibold tab-active">CITIZEN</button>
                <button onclick="switchTab(1)" 
                        class="tab flex-1 py-5 text-sm font-semibold text-zinc-400 hover:text-white">MEMBER</button>
                <button onclick="switchTab(2)" 
                        class="tab flex-1 py-5 text-sm font-semibold text-zinc-400 hover:text-white">COUNCIL</button>
                <button onclick="switchTab(3)" 
                        class="tab flex-1 py-5 text-sm font-semibold text-zinc-400 hover:text-white">FOUNDER</button>
            </div>

            <!-- Login Form -->
            <form id="loginForm" class="space-y-8">
                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">EMAIL / USER ID</label>
                    <div class="relative">
                        <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
                            <i class="fa-solid fa-envelope"></i>
                        </div>
                        <input type="email" id="email" 
                               class="w-full bg-zinc-900 border border-white/20 focus:border-blue-500 rounded-2xl py-6 pl-12 pr-6 outline-none text-lg"
                               placeholder="citizen@arizoe.in" required>
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-zinc-400 mb-2">PASSWORD</label>
                    <div class="relative">
                        <div class="absolute left-5 top-1/2 -translate-y-1/2 text-zinc-400">
                            <i class="fa-solid fa-lock"></i>
                        </div>
                        <input type="password" id="password" 
                               class="w-full bg-zinc-900 border border-white/20 focus:border-blue-500 rounded-2xl py-6 pl-12 pr-6 outline-none text-lg"
                               placeholder="••••••••" required>
                    </div>
                </div>

                <div class="flex items-center justify-between">
                    <label class="flex items-center gap-x-3 cursor-pointer">
                        <input type="checkbox" class="w-5 h-5 accent-blue-600">
                        <span class="text-sm text-zinc-300">Remember me</span>
                    </label>
                    <a href="#" onclick="forgotPassword()" 
                       class="text-blue-400 hover:text-blue-300 text-sm font-medium">Forgot Password?</a>
                </div>

                <button type="submit"
                        class="w-full bg-blue-600 hover:bg-blue-700 py-7 rounded-3xl text-xl font-semibold transition-all active:scale-[0.985]">
                    SIGN IN SECURELY
                </button>
            </form>

            <!-- Divider -->
            <div class="my-10 flex items-center gap-x-4">
                <div class="flex-1 h-px bg-white/10"></div>
                <span class="text-xs text-zinc-500 uppercase tracking-widest">or</span>
                <div class="flex-1 h-px bg-white/10"></div>
            </div>

            <!-- Alternative Login -->
            <div class="grid grid-cols-2 gap-4">
                <button onclick="demoLogin('Aadhaar')" 
                        class="border border-white/30 hover:border-white/60 py-6 rounded-3xl text-sm font-medium flex items-center justify-center gap-x-3">
                    <i class="fa-solid fa-fingerprint"></i>
                    <span>Aadhaar</span>
                </button>
                <button onclick="demoLogin('DIGILOCKER')"

                    <i class="fa-solid fa-id-card"></i>
                    <span>DigiLocker</span>

            </div>

            <div class="text-center mt-10 text-xs text-zinc-500">
                Secured by <span class="text-emerald-400">ARIZOE SHIELD</span> • End-to-end encrypted
            </div>
        </div>

        <!-- Footer Links -->
        <div class="text-center text-xs text-zinc-500 mt-10 flex justify-center gap-x-8">
            <a href="#" class="hover:text-zinc-300">Privacy</a>
            <a href="#" class="hover:text-zinc-300">Terms</a>
            <a href="#" class="hover:text-zinc-300">Help Center</a>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Tab switching
        function switchTab(n) {
            const tabs = document.querySelectorAll('.tab');
            tabs.forEach((tab, index) => {
                if (index === n) {
                    tab.classList.add('tab-active', 'text-white');
                    tab.classList.remove('text-zinc-400');
                } else {
                    tab.classList.remove('tab-active', 'text-white');
                    tab.classList.add('text-zinc-400');
                }
            });
        }

        // Forgot password demo
        function forgotPassword() {
            alert("Password reset link would be sent to your registered email.");
        }

        // Demo login
        function demoLogin(method) {
            const toastHTML = `
                <div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-8 py-4 rounded-3xl shadow-2xl z-50">
                    Logging in via ${method}...
                </div>
            `;
            const temp = document.createElement('div');
            temp.innerHTML = toastHTML;
            document.body.appendChild(temp.firstElementChild);
            
            setTimeout(() => {
                window.location.href = "index.html";
            }, 1400);
        }

        // Form handling
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            if (email) {
                // Simulate successful login
                const successToast = document.createElement('div');
                successToast.className = "fixed bottom-8 left-1/2 -translate-x-1/2 bg-emerald-600 text-white px-10 py-5 rounded-3xl shadow-2xl z-[9999]";
                successToast.innerHTML = "✅ Login successful. Redirecting to dashboard...";
                document.body.appendChild(successToast);
                
                setTimeout(() => {
                    window.location.href = "index.html";
                }, 1500);
            }
        });

        // Initialize Tailwind and existing script behaviors
        window.addEventListener('load', () => {
            // Any additional initialization
        });
    </script>
</body>
</html>
