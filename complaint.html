<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ARIZOE JUSTICE - File Complaint">
    <title>File Complaint • ARIZOE JUSTICE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- TOP BAR -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">⚖️</div>
                <div>
                    <span class="font-bold tracking-tighter text-3xl">ARIZOE</span>
                    <span class="font-bold tracking-tighter text-blue-400 text-3xl">JUSTICE</span>
                </div>
            </div>
            <a href="dashboard.html" class="text-blue-400 hover:text-blue-300 flex items-center gap-x-2">
                <i class="fa-solid fa-arrow-left"></i>
                <span>Back to Dashboard</span>
            </a>
        </div>
    </header>

    <div class="max-w-4xl mx-auto px-6 py-12">
        <h1 class="text-4xl font-bold tracking-tighter mb-2">File a New Complaint</h1>
        <p class="text-zinc-400 mb-10">Your voice matters. Submit your grievance securely.</p>

        <form id="complaint-form" class="glass rounded-3xl p-10 space-y-10">
            <!-- Complaint Category -->
            <div>
                <label class="block text-sm text-zinc-400 mb-3">Complaint Category</label>
                <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <button type="button" class="category-btn glass p-6 rounded-3xl text-center hover:bg-blue-600/20">Municipal</button>
                    <button type="button" class="category-btn glass p-6 rounded-3xl text-center hover:bg-blue-600/20">Police</button>
                    <button type="button" class="category-btn glass p-6 rounded-3xl text-center hover:bg-blue-600/20">Health</button>
                    <button type="button" class="category-btn glass p-6 rounded-3xl text-center hover:bg-blue-600/20">Education</button>
                </div>
            </div>

            <!-- Description -->
            <div>
                <label class="block text-sm text-zinc-400 mb-3">Describe the Issue</label>
                <textarea class="w-full h-40 bg-zinc-900 border border-zinc-700 rounded-3xl p-6 outline-none" placeholder="Provide full details..."></textarea>
            </div>

            <!-- Location -->
            <div class="grid md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-sm text-zinc-400 mb-3">Location</label>
                    <input type="text" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-6 px-6" placeholder="City, Area, Pincode">
                </div>
                <div>
                    <label class="block text-sm text-zinc-400 mb-3">Date of Incident</label>
                    <input type="date" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl py-6 px-6">
                </div>
            </div>

            <!-- Evidence -->
            <div>
                <label class="block text-sm text-zinc-400 mb-3">Upload Evidence (Photos, Documents)</label>
                <div class="border border-dashed border-zinc-600 rounded-3xl p-12 text-center">
                    <i class="fa-solid fa-cloud-arrow-up text-4xl mb-4 text-zinc-500"></i>
                    <p class="text-zinc-400">Drag & drop or click to upload</p>
                </div>
            </div>

            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 py-7 rounded-3xl text-xl font-semibold">
                Submit Complaint
            </button>
        </form>
    </div>

    <script src="script.js"></script>
</body>
</html>
