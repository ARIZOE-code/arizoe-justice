<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ARIZOE JUSTICE - Digital Justice Command Center">
    <title>Command Center • ARIZOE JUSTICE</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <!-- TOP BAR -->
    <header class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-5 flex items-center justify-between">
            <div class="flex items-center gap-x-4">
                <div class="w-10 h-10 bg-gradient-to-br from-blue-500 to-cyan-400 rounded-2xl flex items-center justify-center text-3xl">⚖️</div>
                <div>
                    <span class="font-bold tracking-tighter text-3xl">ARIZOE</span>
                    <span class="font-bold tracking-tighter text-blue-400 text-3xl">JUSTICE</span>
                </div>
            </div>

            <div class="flex-1 max-w-xl mx-12 relative hidden md:block">
                <input type="text" id="global-search" class="w-full bg-zinc-800 border border-zinc-700 focus:border-blue-500 rounded-3xl py-4 pl-14 text-sm outline-none" placeholder="Search across platform...">
                <i class="fa-solid fa-magnifying-glass absolute left-6 top-4 text-zinc-400"></i>
            </div>

            <div class="flex items-center gap-x-6">
                <button id="notification-btn" class="relative text-2xl hover:text-blue-400 transition-colors">
                    <i class="fa-solid fa-bell"></i>
                    <span class="absolute -top-1 -right-1 bg-red-500 text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">3</span>
                </button>
                <div class="flex items-center gap-x-3 cursor-pointer">
                    <div class="text-right">
                        <div class="font-semibold text-sm">Priya Sharma</div>
                        <div class="text-xs text-emerald-400">Verified Citizen</div>
                    </div>
                    <div class="w-9 h-9 bg-gradient-to-br from-blue-500 to-cyan-300 text-zinc-900 font-bold rounded-2xl flex items-center justify-center">PS</div>
                </div>
            </div>
        </div>
    </header>

    <div class="flex max-w-screen-2xl mx-auto">
        <!-- SIDEBAR -->
        <nav class="hidden xl:block w-72 border-r border-zinc-800 bg-zinc-900 min-h-screen p-6">
            <div class="space-y-1">
                <a href="#" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl bg-blue-600/10 text-blue-400">
                    <i class="fa-solid fa-house"></i>
                    <span class="font-medium">Dashboard</span>
                </a>
                <a href="complaint.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-file-circle-plus"></i>
                    <span class="font-medium">Complaints</span>
                </a>
                <a href="campaigns.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-flag"></i>
                    <span class="font-medium">Campaigns</span>
                </a>
                <a href="library.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-book"></i>
                    <span class="font-medium">Law Library</span>
                </a>
                <a href="ai.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-robot"></i>
                    <span class="font-medium">AI Center</span>
                </a>
                <a href="government.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-landmark"></i>
                    <span class="font-medium">Government Connect</span>
                </a>
                <a href="media.html" class="flex items-center gap-x-4 px-5 py-4 rounded-3xl hover:bg-white/5">
                    <i class="fa-solid fa-play"></i>
                    <span class="font-medium">Media Center</span>
                </a>
            </div>
        </nav>

        <!-- MAIN CONTENT -->
        <main class="flex-1 p-8">
            <div class="max-w-7xl mx-auto">
                <h1 class="text-5xl font-bold tracking-tighter mb-2">Welcome back, Priya Sharma</h1>
                <p class="text-zinc-400 mb-12">Central hub for digital justice operations</p>

                <!-- Stats -->
                <div class="grid grid-cols-2 md:grid-cols-4 gap-6 mb-12">
                    <div class="glass rounded-3xl p-8">
                        <div class="text-emerald-400 text-sm">Complaints</div>
                        <div class="text-5xl font-mono font-bold mt-3">18</div>
                    </div>
                    <div class="glass rounded-3xl p-8">
                        <div class="text-blue-400 text-sm">Campaigns</div>
                        <div class="text-5xl font-mono font-bold mt-3">7</div>
                    </div>
                    <div class="glass rounded-3xl p-8">
                        <div class="text-purple-400 text-sm">AI Checks</div>
                        <div class="text-5xl font-mono font-bold mt-3">42</div>
                    </div>
                    <div class="glass rounded-3xl p-8">
                        <div class="text-amber-400 text-sm">RTIs</div>
                        <div class="text-5xl font-mono font-bold mt-3">12</div>
                    </div>
                </div>

                <!-- Rest of your content remains same as previous version -->
                <!-- (Recent Activity, Quick Access, Government Connect etc.) -->

            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
